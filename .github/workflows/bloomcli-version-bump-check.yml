name: bloomcli-version-bump-check

# Pre-merge guard: if a PR into staging or main changes bloomcli source, it must
# also bump the version in bloomcli/pyproject.toml. Without this, a dev build
# would publish under a stale release line, and a prod publish would silently
# skip (PyPI versions are immutable). Runs on every PR to staging/main (no path
# filter) so it always reports a status and can be a required check; it
# short-circuits to success when no bloomcli source changed.
on:
  pull_request:
    branches: [staging, main]

permissions:
  contents: read

jobs:
  version-bump:
    name: Require version bump on bloomcli changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version bump
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if ! git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- bloomcli/src | grep -q .; then
            echo "No bloomcli/src changes in this PR — version bump not required."
            exit 0
          fi
          old=$(git show "$BASE_SHA:bloomcli/pyproject.toml" 2>/dev/null | grep -m1 '^version = ' | sed -E 's/version = "(.*)"/\1/')
          new=$(git show "$HEAD_SHA:bloomcli/pyproject.toml" 2>/dev/null | grep -m1 '^version = ' | sed -E 's/version = "(.*)"/\1/')
          if [ -z "$new" ]; then
            echo "::error::could not read version from bloomcli/pyproject.toml on this branch."
            exit 1
          fi
          if [ "$old" = "$new" ]; then
            echo "::error::bloomcli/src changed but the version is still ${new}. Bump 'version' in bloomcli/pyproject.toml (pre-release like 0.1.0aN during alpha, or a stable bump for a final release)."
            exit 1
          fi
          echo "Version bumped: ${old} -> ${new}. OK."
