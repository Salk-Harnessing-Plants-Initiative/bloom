name: Deploy

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  # Supabase CLI version — MUST match the value pinned in pr-checks.yml and
  # the version installed on the Salk deploy server. Before deploy each
  # migration step asserts `supabase --version` equals this.
  SUPABASE_VERSION: "2.92.1"

jobs:
  deploy-production:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      # Shared group for both prod and staging — only one deploy runs at a
      # time across the whole repo (single Salk server, single docker daemon).
      group: deploy-bloom
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_HOST_KEY }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Snapshot existing .env.prod for rollback
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            if [ -f .env.prod ]; then
              cp -p .env.prod .env.prod.previous
              echo 'Saved .env.prod as .env.prod.previous (mode preserved)'
            else
              echo 'No existing .env.prod — first deploy, skipping snapshot'
            fi
          "

      - name: Generate .env.prod on server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "umask 077 && cat > ${{ secrets.PROD_DEPLOY_PATH }}/.env.prod << 'ENVEOF'
          POSTGRES_DB=${{ secrets.PROD_POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.PROD_POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }}
          POSTGRES_PORT=${{ secrets.PROD_POSTGRES_PORT }}
          POSTGRES_HOST=${{ secrets.PROD_POSTGRES_HOST }}
          PGRST_DB_SCHEMAS=${{ secrets.PROD_PGRST_DB_SCHEMAS }}
          ANON_KEY=${{ secrets.PROD_ANON_KEY }}
          SERVICE_ROLE_KEY=${{ secrets.PROD_SERVICE_ROLE_KEY }}
          JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
          JWT_EXPIRY=${{ secrets.PROD_JWT_EXPIRY }}
          SUPAVISOR_ENC_KEY=${{ secrets.PROD_SUPAVISOR_ENC_KEY }}
          VAULT_ENC_KEY=${{ secrets.PROD_VAULT_ENC_KEY }}
          SECRET_KEY_BASE=${{ secrets.PROD_SECRET_KEY_BASE }}
          DB_ENC_KEY=${{ secrets.PROD_DB_ENC_KEY }}
          DOMAIN_MAIN=${{ secrets.PROD_DOMAIN_MAIN }}
          DOMAIN_STUDIO=${{ secrets.PROD_DOMAIN_STUDIO }}
          DOMAIN_MINIO=${{ secrets.PROD_DOMAIN_MINIO }}
          CADDY_HTTP_LISTEN_PORT=${{ secrets.PROD_CADDY_HTTP_LISTEN_PORT }}
          CADDY_HTTPS_LISTEN_PORT=${{ secrets.PROD_CADDY_HTTPS_LISTEN_PORT }}
          CADDY_HTTP_PORT=
          CADDY_TLS_DIRECTIVE=tls internal
          POSTGRES_HOST_PORT=5432
          KONG_PORT=${{ secrets.PROD_KONG_PORT }}
          BLOOM_WEB_PORT=${{ secrets.PROD_BLOOM_WEB_PORT }}
          STUDIO_PORT=${{ secrets.PROD_STUDIO_PORT }}
          MINIO_CONSOLE_PORT=${{ secrets.PROD_MINIO_CONSOLE_PORT }}
          MINIO_ROOT_USER=${{ secrets.PROD_MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD=${{ secrets.PROD_MINIO_PASSWORD }}
          MINIO_DATA_PATH=${{ secrets.PROD_MINIO_DATA_PATH }}
          MINIO_BROWSER_REDIRECT_URL=${{ secrets.PROD_MINIO_BROWSER_REDIRECT_URL }}
          POOLER_TENANT_ID=${{ secrets.PROD_POOLER_TENANT_ID }}
          POOLER_DEFAULT_POOL_SIZE=${{ secrets.PROD_POOLER_DEFAULT_POOL_SIZE }}
          POOLER_MAX_CLIENT_CONN=${{ secrets.PROD_POOLER_MAX_CLIENT_CONN }}
          POOLER_DB_POOL_SIZE=${{ secrets.PROD_POOLER_DB_POOL_SIZE }}
          DASHBOARD_USERNAME=${{ secrets.PROD_DASHBOARD_USERNAME }}
          DASHBOARD_PASSWORD=${{ secrets.PROD_DASHBOARD_PASSWORD }}
          SITE_URL=${{ secrets.PROD_SITE_URL }}
          API_EXTERNAL_URL=${{ secrets.PROD_API_EXTERNAL_URL }}
          ADDITIONAL_REDIRECT_URLS=${{ secrets.PROD_ADDITIONAL_REDIRECT_URLS }}
          ENABLE_ANONYMOUS_USERS=${{ secrets.PROD_ENABLE_ANONYMOUS_USERS }}
          ENABLE_EMAIL_SIGNUP=${{ secrets.PROD_ENABLE_EMAIL_SIGNUP }}
          ENABLE_EMAIL_AUTOCONFIRM=${{ secrets.PROD_ENABLE_EMAIL_AUTOCONFIRM }}
          DISABLE_SIGNUP=${{ secrets.PROD_DISABLE_SIGNUP }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.PROD_NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.PROD_ANON_KEY }}
          NEXT_PUBLIC_APP_URL=${{ secrets.PROD_NEXT_PUBLIC_APP_URL }}
          SUPABASE_URL=${{ secrets.PROD_SUPABASE_URL }}
          SUPABASE_PUBLIC_URL=${{ secrets.PROD_SUPABASE_PUBLIC_URL }}
          SUPABASE_COOKIE_NAME=${{ secrets.PROD_SUPABASE_COOKIE_NAME }}
          STUDIO_DEFAULT_ORGANIZATION=${{ secrets.PROD_STUDIO_DEFAULT_ORGANIZATION }}
          STUDIO_DEFAULT_PROJECT=${{ secrets.PROD_STUDIO_DEFAULT_PROJECT }}
          STUDIO_SUPABASE_PUBLIC_URL=${{ secrets.PROD_STUDIO_SUPABASE_PUBLIC_URL }}
          IMGPROXY_URL=${{ secrets.PROD_IMGPROXY_URL }}
          IMGPROXY_ENABLE_WEBP_DETECTION=${{ secrets.PROD_IMGPROXY_ENABLE_WEBP_DETECTION }}
          BLOOM_PLOTS_DIR=${{ secrets.PROD_BLOOM_PLOTS_DIR }}
          BLOOM_PLOTS_URL=${{ secrets.PROD_BLOOM_PLOTS_URL }}
          BLOOMMCP_API_KEY=${{ secrets.PROD_BLOOMMCP_API_KEY }}
          BLOOM_MCP_URL=${{ secrets.PROD_BLOOM_MCP_URL }}
          OPENAI_API_KEY=${{ secrets.PROD_OPENAI_API_KEY }}
          CORS_ORIGINS=${{ secrets.PROD_CORS_ORIGINS }}
          LANGCHAIN_TRACING_V2=${{ secrets.PROD_LANGCHAIN_TRACING_V2 }}
          LANGCHAIN_API_KEY=${{ secrets.PROD_LANGCHAIN_API_KEY }}
          LANGCHAIN_PROJECT=${{ secrets.PROD_LANGCHAIN_PROJECT }}
          LANGCHAIN_POSTGRES_URL=postgresql://${{ secrets.PROD_POSTGRES_USER }}:${{ secrets.PROD_POSTGRES_PASSWORD }}@${{ secrets.PROD_POSTGRES_HOST }}:${{ secrets.PROD_POSTGRES_PORT }}/${{ secrets.PROD_POSTGRES_DB }}
          ENVEOF
          chmod 600 ${{ secrets.PROD_DEPLOY_PATH }}/.env.prod"

      - name: Save previous SHA for rollback
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            git rev-parse HEAD > .previous_sha
            echo \"Saved previous SHA: \$(cat .previous_sha)\"
          "

      - name: Pull latest code
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            if ! git diff --quiet || ! git diff --cached --quiet; then
              echo '::error::Working tree is dirty on production server — deploy aborted'
              echo 'Uncommitted changes detected:'
              git status --short
              echo ''
              echo 'Someone made local changes on the server. Resolve before deploying:'
              echo '  1. SSH to the server and commit + push the changes, or'
              echo '  2. Discard them: git checkout -- .'
              echo 'Previous deployment remains running.'
              exit 1
            fi
            git fetch origin main
            git reset --hard origin/main
          "

      - name: Verify Docker Compose version (>= 2.17 required for --wait-timeout)
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            # set -euo pipefail: without this, an unparseable MAJOR/MINOR (e.g.
            # 'docker compose version --short' returning something unexpected)
            # would make the numeric -lt comparison below error out WITHOUT
            # failing the script — then the 'ok' line would print and the
            # deploy would proceed with a possibly-too-old Compose. Copilot
            # round-1 finding; we want the preflight to abort loudly on any
            # parse failure.
            set -euo pipefail
            COMPOSE_VER=\$(docker compose version --short 2>/dev/null | head -1)
            if [ -z \"\$COMPOSE_VER\" ]; then
              echo '::error::docker compose not found on server'
              exit 1
            fi
            # Strip leading 'v' — some installs report 'v2.21.0', which would
            # break the numeric comparison below (MAJOR=v2 is not -lt 2).
            COMPOSE_VER=\${COMPOSE_VER#v}
            MAJOR=\$(echo \"\$COMPOSE_VER\" | cut -d. -f1)
            MINOR=\$(echo \"\$COMPOSE_VER\" | cut -d. -f2)
            # Validate MAJOR and MINOR are integers. If 'docker compose version
            # --short' returns something we don't expect (e.g., 'dev' or empty
            # after the strip), the -lt comparison would error. Fail loudly.
            if ! [[ \"\$MAJOR\" =~ ^[0-9]+\$ && \"\$MINOR\" =~ ^[0-9]+\$ ]]; then
              echo \"::error::Could not parse Docker Compose version from '\$COMPOSE_VER' (MAJOR='\$MAJOR' MINOR='\$MINOR')\"
              exit 1
            fi
            # --wait arrived in Compose v2.1.1 (Oct 2021); --wait-timeout in
            # v2.17.0 (Mar 2023). Without --wait-timeout, --wait defaults to
            # waiting indefinitely — we want the 600s ceiling, so 2.17 is the
            # real minimum here.
            if [ \"\$MAJOR\" -lt 2 ] || { [ \"\$MAJOR\" -eq 2 ] && [ \"\$MINOR\" -lt 17 ]; }; then
              echo \"::error::Docker Compose \$COMPOSE_VER found — need >= 2.17 for --wait-timeout\"
              exit 1
            fi
            echo \"Docker Compose \$COMPOSE_VER ok\"
          "

      - name: Deploy production stack
        run: |
          : "${PROD_DEPLOY_PATH:?PROD_DEPLOY_PATH secret must be set (empty → would cd to \$HOME)}"
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            set -euo pipefail
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            docker compose -f docker-compose.prod.yml --env-file .env.prod \
              up -d --build --remove-orphans --wait --wait-timeout 600
            echo 'Production deployed successfully!'
            docker compose -f docker-compose.prod.yml --env-file .env.prod ps
          "
        env:
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}

      - name: Deploy diagnostics on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            echo '::group::docker compose ps'
            docker compose -f docker-compose.prod.yml --env-file .env.prod ps || true
            echo '::endgroup::'
            echo '::group::docker compose logs --tail=200'
            docker compose -f docker-compose.prod.yml --env-file .env.prod logs --tail=200 || true
            echo '::endgroup::'
          "

      - name: Smoke test
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            set -euo pipefail
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            # Source DOMAIN_* and port from the server-side .env.prod file
            # generated earlier in this workflow (from GitHub Secrets — the
            # env-config split to committed defaults lands in PR #144). Using
            # the deployed .env.prod as the runtime source of truth here keeps
            # the smoke test robust to that upcoming refactor without code
            # changes — after #144 merges, .env.prod is merged from
            # .env.prod.defaults + secrets, same file, same grep.
            DOMAIN_MAIN=\$(grep '^DOMAIN_MAIN=' .env.prod | cut -d= -f2-)
            DOMAIN_STUDIO=\$(grep '^DOMAIN_STUDIO=' .env.prod | cut -d= -f2-)
            DOMAIN_MINIO=\$(grep '^DOMAIN_MINIO=' .env.prod | cut -d= -f2-)
            PORT=\$(grep '^CADDY_HTTP_LISTEN_PORT=' .env.prod | cut -d= -f2-)
            : \"\${DOMAIN_MAIN:?missing DOMAIN_MAIN in .env.prod}\"
            : \"\${DOMAIN_STUDIO:?missing DOMAIN_STUDIO in .env.prod}\"
            : \"\${DOMAIN_MINIO:?missing DOMAIN_MINIO in .env.prod}\"
            : \"\${PORT:?missing CADDY_HTTP_LISTEN_PORT in .env.prod}\"

            failed=0
            # Per-Host probes — Caddy routes studio + minio on SUBDOMAINS, not
            # paths on the apex. curl -L -k follows the auto-HTTPS 308 redirect
            # and accepts Caddy's \`tls internal\` self-signed cert (PR #145).
            # Success window is 2xx/3xx only — 4xx (e.g. unmapped path) is a
            # routing bug we want to surface, not tolerate.
            for probe in \"\$DOMAIN_MAIN|/\" \"\$DOMAIN_MAIN|/api/\" \"\$DOMAIN_STUDIO|/\" \"\$DOMAIN_MINIO|/\" \"\$DOMAIN_MAIN|/api/health\"; do
              HOST=\"\${probe%|*}\"
              ENDPOINT=\"\${probe#*|}\"
              STATUS=\$(curl -sLk -o /dev/null -w '%{http_code}' \
                -H \"Host: \$HOST\" \
                --max-time 10 \
                \"http://localhost:\$PORT\$ENDPOINT\" || echo 000)
              if [ \"\$STATUS\" -lt 200 ] || [ \"\$STATUS\" -ge 400 ]; then
                echo \"::error::Smoke test failed on \$HOST\$ENDPOINT (HTTP \$STATUS)\"
                failed=1
              else
                echo \"  \$HOST\$ENDPOINT -> \$STATUS\"
              fi
            done
            exit \$failed
          "

      # Duplicate of the diagnostics step above. GH Actions evaluates `if:
      # failure()` based on whether any PRIOR step in the job failed — so a
      # diagnostics step placed BEFORE the smoke test only fires on deploy-step
      # failures. For routing/app failures caught by the smoke test, we need
      # another diagnostics step AFTER it. Copilot round-1 finding.
      - name: Smoke-test diagnostics on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            echo '::group::docker compose ps'
            docker compose -f docker-compose.prod.yml --env-file .env.prod ps || true
            echo '::endgroup::'
            echo '::group::docker compose logs --tail=200'
            docker compose -f docker-compose.prod.yml --env-file .env.prod logs --tail=200 || true
            echo '::endgroup::'
          "

      # storage-api creates `storage.buckets` asynchronously on startup. The
      # container-level healthcheck signals "Fastify listening" — NOT "schema
      # ready". Poll for the table so migrations that reference it don't race
      # storage-api's internal init. (Preserves the polling intent from #138
      # item 1, positioned post-health-check to fit PR #142's structure.)
      - name: Wait for storage schema (production)
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            for i in \$(seq 1 60); do
              if docker compose -f docker-compose.prod.yml --env-file .env.prod exec -T db-prod \
                   psql -U supabase_admin -d postgres -tAc \
                   \"SELECT 1 FROM information_schema.tables WHERE table_schema='storage' AND table_name='buckets'\" 2>/dev/null \
                   | grep -q '^1\$'; then
                echo 'storage.buckets ready (attempt '\$i')'
                exit 0
              fi
              sleep 2
            done
            echo '::error::storage.buckets did not appear within 120s — storage-api schema init failed'
            exit 1
          "

      # Apply migrations via Supabase CLI (installed on the Salk server per #135).
      # Extract only Postgres connection vars — avoids leaking JWT_SECRET / keys
      # into the subprocess environment. The `: "${VAR:?msg}"` guards fail the
      # remote script with a clear error if any key is missing from .env.prod,
      # rather than letting `supabase db push` fail later with a cryptic URL
      # parse / auth error.
      - name: Apply database migrations (production)
        env:
          EXPECTED_CLI_VERSION: ${{ env.SUPABASE_VERSION }}
        run: |
          echo "::add-mask::${{ secrets.PROD_POSTGRES_PASSWORD }}"
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            set -euo pipefail
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            command -v supabase >/dev/null || { echo '::error::supabase CLI not found on deploy host'; exit 1; }
            ACTUAL_CLI_VERSION=\$(supabase --version | tr -d '[:space:]')
            if [ \"\$ACTUAL_CLI_VERSION\" != \"$EXPECTED_CLI_VERSION\" ]; then
              echo \"::error::Supabase CLI version mismatch on server: expected $EXPECTED_CLI_VERSION, got \$ACTUAL_CLI_VERSION\"
              exit 1
            fi
            PG_USER=\$(grep -E '^POSTGRES_USER=' .env.prod | cut -d= -f2-)
            PG_PASSWORD=\$(grep -E '^POSTGRES_PASSWORD=' .env.prod | cut -d= -f2-)
            PG_DB=\$(grep -E '^POSTGRES_DB=' .env.prod | cut -d= -f2-)
            PG_HOST_PORT=\$(grep -E '^POSTGRES_HOST_PORT=' .env.prod | cut -d= -f2-)
            : \"\${PG_USER:?POSTGRES_USER missing from .env.prod}\"
            : \"\${PG_PASSWORD:?POSTGRES_PASSWORD missing from .env.prod}\"
            : \"\${PG_DB:?POSTGRES_DB missing from .env.prod}\"
            : \"\${PG_HOST_PORT:?POSTGRES_HOST_PORT missing from .env.prod}\"
            supabase db push --db-url \"postgresql://\${PG_USER}:\${PG_PASSWORD}@127.0.0.1:\${PG_HOST_PORT}/\${PG_DB}?sslmode=disable\" --debug --yes
          " || {
            echo '::error title=Migration failed (production)::See the Migration summary at top of run and the Show-migration-status step for applied vs pending state.'
            exit 1
          }

      # Layer B: diagnostic on any failure upstream. Lists applied vs pending
      # so on-call can see which migration broke without scrolling logs.
      - name: Show migration status on failure (production)
        if: failure()
        run: |
          echo "::add-mask::${{ secrets.PROD_POSTGRES_PASSWORD }}"
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            PG_USER=\$(grep -E '^POSTGRES_USER=' .env.prod | cut -d= -f2-)
            PG_PASSWORD=\$(grep -E '^POSTGRES_PASSWORD=' .env.prod | cut -d= -f2-)
            PG_DB=\$(grep -E '^POSTGRES_DB=' .env.prod | cut -d= -f2-)
            PG_HOST_PORT=\$(grep -E '^POSTGRES_HOST_PORT=' .env.prod | cut -d= -f2-)
            : \"\${PG_HOST_PORT:?POSTGRES_HOST_PORT missing from .env.prod}\"
            supabase migration list --db-url \"postgresql://\${PG_USER}:\${PG_PASSWORD}@127.0.0.1:\${PG_HOST_PORT}/\${PG_DB}?sslmode=disable\" --debug
          " || echo '::warning::Could not fetch migration status'

      # Layer C: migration state as a fenced code block in the run summary.
      # Uses CLI's native text output (the `-o json` flag does NOT exist on
      # `migration list` in the pinned CLI version — see env.SUPABASE_VERSION).
      - name: Migration summary (production)
        if: always()
        run: |
          echo "::add-mask::${{ secrets.PROD_POSTGRES_PASSWORD }}"
          {
            echo "## Database migration state (production)"
            echo ""
            echo '```'
            ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
              cd ${{ secrets.PROD_DEPLOY_PATH }}
              PG_USER=\$(grep -E '^POSTGRES_USER=' .env.prod | cut -d= -f2-)
              PG_PASSWORD=\$(grep -E '^POSTGRES_PASSWORD=' .env.prod | cut -d= -f2-)
              PG_DB=\$(grep -E '^POSTGRES_DB=' .env.prod | cut -d= -f2-)
              PG_HOST_PORT=\$(grep -E '^POSTGRES_HOST_PORT=' .env.prod | cut -d= -f2-)
              : \"\${PG_HOST_PORT:?POSTGRES_HOST_PORT missing from .env.prod}\"
              supabase migration list --db-url \"postgresql://\${PG_USER}:\${PG_PASSWORD}@127.0.0.1:\${PG_HOST_PORT}/\${PG_DB}?sslmode=disable\" --debug
            " 2>/dev/null || echo '(migration state fetch failed)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Rollback on failure
        if: failure()
        run: |
          # DB state is NOT rolled back by this step. If `Apply database
          # migrations` succeeded before the failing step, the database is now
          # on a newer schema than the code being restored. Follow-up tracked
          # in issue #177.
          echo '::warning title=Database schema NOT reverted::Rollback reverts code only. If migrations were applied before failure, manual DB intervention may be required. See https://github.com/Salk-Harnessing-Plants-Initiative/bloom/issues/177.'
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            set -e
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            if [ -f .previous_sha ]; then
              PREV=\$(cat .previous_sha)
              echo \"Rolling back to \$PREV\"
              if [ -f .env.prod.previous ]; then
                cp -p .env.prod.previous .env.prod
                echo 'Restored previous .env.prod (mode preserved)'
              else
                echo 'WARNING: no .env.prod.previous — rolling back with current .env.prod'
              fi
              git reset --hard \$PREV || { echo \"::error::Rollback failed: could not reset to \$PREV — SHA may be unreachable\"; exit 1; }
              # Rollback matches the forward deploy's strictness: use --wait so
              # we don't silently 'succeed' while the rolled-back stack is also
              # broken. Shorter 300s timeout (vs 600s forward) because rollback
              # reuses already-built images — cold-build is not in the critical
              # path.
              docker compose -f docker-compose.prod.yml --env-file .env.prod \
                up -d --build --remove-orphans --wait --wait-timeout 300 \
                || { echo \"::error::Rollback reset to \$PREV succeeded but docker compose --wait failed — previous-version stack is also unhealthy, manual inspection required\"; exit 1; }
              echo 'Rollback complete — previous version restored and healthy'
            else
              echo '::error::No previous SHA saved — manual recovery required'
              exit 1
            fi
          "

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key

  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/staging' || github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      # Shared group for both prod and staging — only one deploy runs at a
      # time across the whole repo (single Salk server, single docker daemon).
      group: deploy-bloom
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_HOST_KEY }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Snapshot existing .env.staging for rollback
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            if [ -f .env.staging ]; then
              cp -p .env.staging .env.staging.previous
              echo 'Saved .env.staging as .env.staging.previous (mode preserved)'
            else
              echo 'No existing .env.staging — first deploy, skipping snapshot'
            fi
          "

      - name: Generate .env.staging on server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "umask 077 && cat > ${{ secrets.STAGING_DEPLOY_PATH }}/.env.staging << 'ENVEOF'
          POSTGRES_DB=${{ secrets.STAGING_POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.STAGING_POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.STAGING_POSTGRES_PASSWORD }}
          POSTGRES_PORT=${{ secrets.STAGING_POSTGRES_PORT }}
          POSTGRES_HOST=${{ secrets.STAGING_POSTGRES_HOST }}
          PGRST_DB_SCHEMAS=${{ secrets.STAGING_PGRST_DB_SCHEMAS }}
          ANON_KEY=${{ secrets.STAGING_ANON_KEY }}
          SERVICE_ROLE_KEY=${{ secrets.STAGING_SERVICE_ROLE_KEY }}
          JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
          JWT_EXPIRY=${{ secrets.STAGING_JWT_EXPIRY }}
          SUPAVISOR_ENC_KEY=${{ secrets.STAGING_SUPAVISOR_ENC_KEY }}
          VAULT_ENC_KEY=${{ secrets.STAGING_VAULT_ENC_KEY }}
          SECRET_KEY_BASE=${{ secrets.STAGING_SECRET_KEY_BASE }}
          DB_ENC_KEY=${{ secrets.STAGING_DB_ENC_KEY }}
          DOMAIN_MAIN=${{ secrets.STAGING_DOMAIN_MAIN }}
          DOMAIN_STUDIO=${{ secrets.STAGING_DOMAIN_STUDIO }}
          DOMAIN_MINIO=${{ secrets.STAGING_DOMAIN_MINIO }}
          CADDY_HTTP_LISTEN_PORT=${{ secrets.STAGING_CADDY_HTTP_LISTEN_PORT }}
          CADDY_HTTPS_LISTEN_PORT=${{ secrets.STAGING_CADDY_HTTPS_LISTEN_PORT }}
          CADDY_HTTP_PORT=
          CADDY_TLS_DIRECTIVE=tls internal
          POSTGRES_HOST_PORT=5433
          KONG_PORT=${{ secrets.STAGING_KONG_PORT }}
          BLOOM_WEB_PORT=${{ secrets.STAGING_BLOOM_WEB_PORT }}
          STUDIO_PORT=${{ secrets.STAGING_STUDIO_PORT }}
          MINIO_CONSOLE_PORT=${{ secrets.STAGING_MINIO_CONSOLE_PORT }}
          MINIO_ROOT_USER=${{ secrets.STAGING_MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD=${{ secrets.STAGING_MINIO_PASSWORD }}
          MINIO_DATA_PATH=${{ secrets.STAGING_MINIO_DATA_PATH }}
          MINIO_BROWSER_REDIRECT_URL=${{ secrets.STAGING_MINIO_BROWSER_REDIRECT_URL }}
          POOLER_TENANT_ID=${{ secrets.STAGING_POOLER_TENANT_ID }}
          POOLER_DEFAULT_POOL_SIZE=${{ secrets.STAGING_POOLER_DEFAULT_POOL_SIZE }}
          POOLER_MAX_CLIENT_CONN=${{ secrets.STAGING_POOLER_MAX_CLIENT_CONN }}
          POOLER_DB_POOL_SIZE=${{ secrets.STAGING_POOLER_DB_POOL_SIZE }}
          DASHBOARD_USERNAME=${{ secrets.STAGING_DASHBOARD_USERNAME }}
          DASHBOARD_PASSWORD=${{ secrets.STAGING_DASHBOARD_PASSWORD }}
          SITE_URL=${{ secrets.STAGING_SITE_URL }}
          API_EXTERNAL_URL=${{ secrets.STAGING_API_EXTERNAL_URL }}
          ADDITIONAL_REDIRECT_URLS=${{ secrets.STAGING_ADDITIONAL_REDIRECT_URLS }}
          ENABLE_ANONYMOUS_USERS=${{ secrets.STAGING_ENABLE_ANONYMOUS_USERS }}
          ENABLE_EMAIL_SIGNUP=${{ secrets.STAGING_ENABLE_EMAIL_SIGNUP }}
          ENABLE_EMAIL_AUTOCONFIRM=${{ secrets.STAGING_ENABLE_EMAIL_AUTOCONFIRM }}
          DISABLE_SIGNUP=${{ secrets.STAGING_DISABLE_SIGNUP }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.STAGING_ANON_KEY }}
          NEXT_PUBLIC_APP_URL=${{ secrets.STAGING_NEXT_PUBLIC_APP_URL }}
          SUPABASE_URL=${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_PUBLIC_URL=${{ secrets.STAGING_SUPABASE_PUBLIC_URL }}
          SUPABASE_COOKIE_NAME=${{ secrets.STAGING_SUPABASE_COOKIE_NAME }}
          STUDIO_DEFAULT_ORGANIZATION=${{ secrets.STAGING_STUDIO_DEFAULT_ORGANIZATION }}
          STUDIO_DEFAULT_PROJECT=${{ secrets.STAGING_STUDIO_DEFAULT_PROJECT }}
          STUDIO_SUPABASE_PUBLIC_URL=${{ secrets.STAGING_STUDIO_SUPABASE_PUBLIC_URL }}
          IMGPROXY_URL=${{ secrets.STAGING_IMGPROXY_URL }}
          IMGPROXY_ENABLE_WEBP_DETECTION=${{ secrets.STAGING_IMGPROXY_ENABLE_WEBP_DETECTION }}
          BLOOM_PLOTS_DIR=${{ secrets.STAGING_BLOOM_PLOTS_DIR }}
          BLOOM_PLOTS_URL=${{ secrets.STAGING_BLOOM_PLOTS_URL }}
          BLOOMMCP_API_KEY=${{ secrets.STAGING_BLOOMMCP_API_KEY }}
          BLOOM_MCP_URL=${{ secrets.STAGING_BLOOM_MCP_URL }}
          OPENAI_API_KEY=${{ secrets.STAGING_OPENAI_API_KEY }}
          CORS_ORIGINS=${{ secrets.STAGING_CORS_ORIGINS }}
          LANGCHAIN_TRACING_V2=${{ secrets.STAGING_LANGCHAIN_TRACING_V2 }}
          LANGCHAIN_API_KEY=${{ secrets.STAGING_LANGCHAIN_API_KEY }}
          LANGCHAIN_PROJECT=${{ secrets.STAGING_LANGCHAIN_PROJECT }}
          LANGCHAIN_POSTGRES_URL=postgresql://${{ secrets.STAGING_POSTGRES_USER }}:${{ secrets.STAGING_POSTGRES_PASSWORD }}@${{ secrets.STAGING_POSTGRES_HOST }}:${{ secrets.STAGING_POSTGRES_PORT }}/${{ secrets.STAGING_POSTGRES_DB }}
          ENVEOF
          chmod 600 ${{ secrets.STAGING_DEPLOY_PATH }}/.env.staging"

      - name: Save previous SHA for rollback
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            git rev-parse HEAD > .previous_sha
            echo \"Saved previous SHA: \$(cat .previous_sha)\"
          "

      - name: Pull latest code
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            if ! git diff --quiet || ! git diff --cached --quiet; then
              echo '::error::Working tree is dirty on staging server — deploy aborted'
              echo 'Uncommitted changes detected:'
              git status --short
              echo ''
              echo 'Someone made local changes on the server. Resolve before deploying:'
              echo '  1. SSH to the server and commit + push the changes, or'
              echo '  2. Discard them: git checkout -- .'
              echo 'Previous deployment remains running.'
              exit 1
            fi
            git fetch origin staging
            git reset --hard origin/staging
          "

      - name: Verify Docker Compose version (>= 2.17 required for --wait-timeout)
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            # See prod version of this step for why set -euo pipefail is load-
            # bearing here (unparseable MAJOR/MINOR would otherwise silently
            # allow the deploy to proceed with a too-old Compose).
            set -euo pipefail
            COMPOSE_VER=\$(docker compose version --short 2>/dev/null | head -1)
            if [ -z \"\$COMPOSE_VER\" ]; then
              echo '::error::docker compose not found on server'
              exit 1
            fi
            # Strip leading 'v' — some installs report 'v2.21.0'.
            COMPOSE_VER=\${COMPOSE_VER#v}
            MAJOR=\$(echo \"\$COMPOSE_VER\" | cut -d. -f1)
            MINOR=\$(echo \"\$COMPOSE_VER\" | cut -d. -f2)
            if ! [[ \"\$MAJOR\" =~ ^[0-9]+\$ && \"\$MINOR\" =~ ^[0-9]+\$ ]]; then
              echo \"::error::Could not parse Docker Compose version from '\$COMPOSE_VER' (MAJOR='\$MAJOR' MINOR='\$MINOR')\"
              exit 1
            fi
            # --wait arrived in v2.1.1; --wait-timeout in v2.17. We need the
            # latter so the ceiling applies.
            if [ \"\$MAJOR\" -lt 2 ] || { [ \"\$MAJOR\" -eq 2 ] && [ \"\$MINOR\" -lt 17 ]; }; then
              echo \"::error::Docker Compose \$COMPOSE_VER found — need >= 2.17 for --wait-timeout\"
              exit 1
            fi
            echo \"Docker Compose \$COMPOSE_VER ok\"
          "

      - name: Deploy staging stack
        run: |
          : "${STAGING_DEPLOY_PATH:?STAGING_DEPLOY_PATH secret must be set (empty → would cd to \$HOME)}"
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            set -euo pipefail
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            docker compose -p bloom_v2_staging -f docker-compose.prod.yml --env-file .env.staging \
              up -d --build --remove-orphans --wait --wait-timeout 600
            echo 'Staging deployed successfully!'
            docker compose -p bloom_v2_staging -f docker-compose.prod.yml --env-file .env.staging ps
          "
        env:
          STAGING_DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}

      - name: Deploy diagnostics on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            echo '::group::docker compose ps'
            docker compose -p bloom_v2_staging -f docker-compose.prod.yml --env-file .env.staging ps || true
            echo '::endgroup::'
            echo '::group::docker compose logs --tail=200'
            docker compose -p bloom_v2_staging -f docker-compose.prod.yml --env-file .env.staging logs --tail=200 || true
            echo '::endgroup::'
          "

      - name: Smoke test
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            set -euo pipefail
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            # Source DOMAIN_* and port from the server-side .env.staging file
            # generated earlier in this workflow (from GitHub Secrets today;
            # from .env.staging.defaults + secrets after PR #144 merges).
            # Reading from the deployed .env file is the runtime source of
            # truth for this smoke test — robust across that config-source
            # refactor without code changes here.
            DOMAIN_MAIN=\$(grep '^DOMAIN_MAIN=' .env.staging | cut -d= -f2-)
            DOMAIN_STUDIO=\$(grep '^DOMAIN_STUDIO=' .env.staging | cut -d= -f2-)
            DOMAIN_MINIO=\$(grep '^DOMAIN_MINIO=' .env.staging | cut -d= -f2-)
            PORT=\$(grep '^CADDY_HTTP_LISTEN_PORT=' .env.staging | cut -d= -f2-)
            : \"\${DOMAIN_MAIN:?missing DOMAIN_MAIN in .env.staging}\"
            : \"\${DOMAIN_STUDIO:?missing DOMAIN_STUDIO in .env.staging}\"
            : \"\${DOMAIN_MINIO:?missing DOMAIN_MINIO in .env.staging}\"
            : \"\${PORT:?missing CADDY_HTTP_LISTEN_PORT in .env.staging}\"

            failed=0
            for probe in \"\$DOMAIN_MAIN|/\" \"\$DOMAIN_MAIN|/api/\" \"\$DOMAIN_STUDIO|/\" \"\$DOMAIN_MINIO|/\" \"\$DOMAIN_MAIN|/api/health\"; do
              HOST=\"\${probe%|*}\"
              ENDPOINT=\"\${probe#*|}\"
              STATUS=\$(curl -sLk -o /dev/null -w '%{http_code}' \
                -H \"Host: \$HOST\" \
                --max-time 10 \
                \"http://localhost:\$PORT\$ENDPOINT\" || echo 000)
              if [ \"\$STATUS\" -lt 200 ] || [ \"\$STATUS\" -ge 400 ]; then
                echo \"::error::Smoke test failed on \$HOST\$ENDPOINT (HTTP \$STATUS)\"
                failed=1
              else
                echo \"  \$HOST\$ENDPOINT -> \$STATUS\"
              fi
            done
            exit \$failed
          "

      # Second diagnostics step — see prod version for rationale (smoke test
      # failures don't fire the earlier diagnostics step which is gated by
      # deploy-step failure, not any-step failure). Copilot round-1 finding.
      - name: Smoke-test diagnostics on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            echo '::group::docker compose ps'
            docker compose -p bloom_v2_staging -f docker-compose.prod.yml --env-file .env.staging ps || true
            echo '::endgroup::'
            echo '::group::docker compose logs --tail=200'
            docker compose -p bloom_v2_staging -f docker-compose.prod.yml --env-file .env.staging logs --tail=200 || true
            echo '::endgroup::'
          "

      # See production "Wait for storage schema" step for the reasoning.
      - name: Wait for storage schema (staging)
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            for i in \$(seq 1 60); do
              if docker compose -p bloom_v2_staging -f docker-compose.prod.yml --env-file .env.staging exec -T db-prod \
                   psql -U supabase_admin -d postgres -tAc \
                   \"SELECT 1 FROM information_schema.tables WHERE table_schema='storage' AND table_name='buckets'\" 2>/dev/null \
                   | grep -q '^1\$'; then
                echo 'storage.buckets ready (attempt '\$i')'
                exit 0
              fi
              sleep 2
            done
            echo '::error::storage.buckets did not appear within 120s — storage-api schema init failed'
            exit 1
          "

      - name: Apply database migrations (staging)
        env:
          EXPECTED_CLI_VERSION: ${{ env.SUPABASE_VERSION }}
        run: |
          echo "::add-mask::${{ secrets.STAGING_POSTGRES_PASSWORD }}"
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            set -euo pipefail
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            command -v supabase >/dev/null || { echo '::error::supabase CLI not found on deploy host'; exit 1; }
            ACTUAL_CLI_VERSION=\$(supabase --version | tr -d '[:space:]')
            if [ \"\$ACTUAL_CLI_VERSION\" != \"$EXPECTED_CLI_VERSION\" ]; then
              echo \"::error::Supabase CLI version mismatch on server: expected $EXPECTED_CLI_VERSION, got \$ACTUAL_CLI_VERSION\"
              exit 1
            fi
            PG_USER=\$(grep -E '^POSTGRES_USER=' .env.staging | cut -d= -f2-)
            PG_PASSWORD=\$(grep -E '^POSTGRES_PASSWORD=' .env.staging | cut -d= -f2-)
            PG_DB=\$(grep -E '^POSTGRES_DB=' .env.staging | cut -d= -f2-)
            PG_HOST_PORT=\$(grep -E '^POSTGRES_HOST_PORT=' .env.staging | cut -d= -f2-)
            : \"\${PG_USER:?POSTGRES_USER missing from .env.staging}\"
            : \"\${PG_PASSWORD:?POSTGRES_PASSWORD missing from .env.staging}\"
            : \"\${PG_DB:?POSTGRES_DB missing from .env.staging}\"
            : \"\${PG_HOST_PORT:?POSTGRES_HOST_PORT missing from .env.staging}\"
            supabase db push --db-url \"postgresql://\${PG_USER}:\${PG_PASSWORD}@127.0.0.1:\${PG_HOST_PORT}/\${PG_DB}?sslmode=disable\" --debug --yes
          " || {
            echo '::error title=Migration failed (staging)::See the Migration summary at top of run and the Show-migration-status step for applied vs pending state.'
            exit 1
          }

      - name: Show migration status on failure (staging)
        if: failure()
        run: |
          echo "::add-mask::${{ secrets.STAGING_POSTGRES_PASSWORD }}"
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            PG_USER=\$(grep -E '^POSTGRES_USER=' .env.staging | cut -d= -f2-)
            PG_PASSWORD=\$(grep -E '^POSTGRES_PASSWORD=' .env.staging | cut -d= -f2-)
            PG_DB=\$(grep -E '^POSTGRES_DB=' .env.staging | cut -d= -f2-)
            PG_HOST_PORT=\$(grep -E '^POSTGRES_HOST_PORT=' .env.staging | cut -d= -f2-)
            : \"\${PG_HOST_PORT:?POSTGRES_HOST_PORT missing from .env.staging}\"
            supabase migration list --db-url \"postgresql://\${PG_USER}:\${PG_PASSWORD}@127.0.0.1:\${PG_HOST_PORT}/\${PG_DB}?sslmode=disable\" --debug
          " || echo '::warning::Could not fetch migration status'

      - name: Migration summary (staging)
        if: always()
        run: |
          echo "::add-mask::${{ secrets.STAGING_POSTGRES_PASSWORD }}"
          {
            echo "## Database migration state (staging)"
            echo ""
            echo '```'
            ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
              cd ${{ secrets.STAGING_DEPLOY_PATH }}
              PG_USER=\$(grep -E '^POSTGRES_USER=' .env.staging | cut -d= -f2-)
              PG_PASSWORD=\$(grep -E '^POSTGRES_PASSWORD=' .env.staging | cut -d= -f2-)
              PG_DB=\$(grep -E '^POSTGRES_DB=' .env.staging | cut -d= -f2-)
              PG_HOST_PORT=\$(grep -E '^POSTGRES_HOST_PORT=' .env.staging | cut -d= -f2-)
              : \"\${PG_HOST_PORT:?POSTGRES_HOST_PORT missing from .env.staging}\"
              supabase migration list --db-url \"postgresql://\${PG_USER}:\${PG_PASSWORD}@127.0.0.1:\${PG_HOST_PORT}/\${PG_DB}?sslmode=disable\" --debug
            " 2>/dev/null || echo '(migration state fetch failed)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Rollback on failure
        if: failure()
        run: |
          # DB state is NOT rolled back by this step. See the matching comment
          # on the production rollback step above and issue #177.
          echo '::warning title=Database schema NOT reverted::Rollback reverts code only. If migrations were applied before failure, manual DB intervention may be required. See https://github.com/Salk-Harnessing-Plants-Initiative/bloom/issues/177.'
          ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            set -e
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            if [ -f .previous_sha ]; then
              PREV=\$(cat .previous_sha)
              echo \"Rolling back to \$PREV\"
              if [ -f .env.staging.previous ]; then
                cp -p .env.staging.previous .env.staging
                echo 'Restored previous .env.staging (mode preserved)'
              else
                echo 'WARNING: no .env.staging.previous — rolling back with current .env.staging'
              fi
              git reset --hard \$PREV || { echo \"::error::Rollback failed: could not reset to \$PREV — SHA may be unreachable\"; exit 1; }
              # Symmetric --wait with forward deploy — see prod rollback for
              # rationale. Shorter 300s timeout since rollback reuses built
              # images.
              docker compose -p bloom_v2_staging -f docker-compose.prod.yml --env-file .env.staging \
                up -d --build --remove-orphans --wait --wait-timeout 300 \
                || { echo \"::error::Rollback reset to \$PREV succeeded but docker compose --wait failed — previous-version stack is also unhealthy, manual inspection required\"; exit 1; }
              echo 'Rollback complete — previous version restored and healthy'
            else
              echo '::error::No previous SHA saved — manual recovery required'
              exit 1
            fi
          "

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
