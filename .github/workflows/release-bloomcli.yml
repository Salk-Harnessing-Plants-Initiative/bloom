name: release-bloomcli

# Publishes the final bloomcli package to PyPI. Fires on either a merge to main
# or a bloomcli-v* tag (plus manual dispatch). Separate from the server deploy
# workflow. PyPI versions are immutable and one-shot, so the job first checks
# whether the version in pyproject.toml is already on PyPI and skips cleanly if
# so — this makes "publish on every main push" safe without a version bump.
on:
  push:
    branches: [main]
    tags: ['bloomcli-v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # OIDC token for PyPI trusted publishing

concurrency:
  group: release-bloomcli-prod
  cancel-in-progress: false

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - name: Read package version
        id: ver
        working-directory: bloomcli
        run: echo "version=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')" >> "$GITHUB_OUTPUT"
      - name: Skip if version already on PyPI (immutability guard)
        id: guard
        run: |
          v="${{ steps.ver.outputs.version }}"
          code=$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/bloomcli/${v}/json")
          if [ "$code" = "200" ]; then
            echo "bloomcli ${v} is already on PyPI — skipping publish."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "bloomcli ${v} not yet on PyPI — will publish."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build sdist + wheel
        if: steps.guard.outputs.exists == 'false'
        working-directory: bloomcli
        run: uv build
      - name: Publish to PyPI (OIDC trusted publishing)
        if: steps.guard.outputs.exists == 'false'
        working-directory: bloomcli
        run: uv publish --trusted-publishing always
