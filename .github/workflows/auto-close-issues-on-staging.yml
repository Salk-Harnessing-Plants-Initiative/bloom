name: Auto-close issues on staging merge

# GitHub's built-in "Closes #123" auto-close only fires when a PR merges into
# the repository's DEFAULT branch (main). This project's flow is
# feature -> staging -> (periodic promotion PR) -> main, so feature PRs merge
# into `staging` and their closing keywords never fire — issues stay OPEN until
# someone closes them by hand (see #305/#306, which shipped via #313/#321 but
# stayed open). The promotion PR to main doesn't restate the keywords either.
#
# This workflow replicates GitHub's native behavior at the staging line: when a
# PR is MERGED into `staging`, it scans the PR title + body for closing keywords
# and closes each referenced same-repo issue with a comment linking the PR.
#
# Treating "merged to staging" as the done line matches how the team already
# works (Tier work is considered complete once it lands on staging).
#
# IMPORTANT: pull_request workflows run from the workflow file on the PR's BASE
# branch. This file must exist on `staging` (and main) for it to fire — merge it
# through the normal flow first; it takes effect for PRs opened afterward.

on:
  pull_request:
    types: [closed]
    branches: [staging]

# Default token is read-only; we need to close issues and post comments.
permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  close-referenced-issues:
    name: Close issues referenced by closing keywords
    # Only merged PRs — a PR closed without merging must NOT close its issues.
    # Note on forks: for a pull_request event from a fork, GitHub forces
    # GITHUB_TOKEN read-only regardless of the permissions: block above, so the
    # close would no-op (logged as a warning). The team's flow is same-repo
    # branches, so this is fine in practice — a fork-based contribution just
    # won't auto-close its issues and would need a manual close.
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Close referenced issues
        # SHA-pinned per repo supply-chain convention (matches setup-uv in
        # pr-checks.yml) — a privileged issues:write step shouldn't ride a
        # floating tag.
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const text = `${pr.title}\n\n${pr.body || ''}`;

            // Mirror GitHub's supported closing keywords. Match keyword + #<num>
            // for issues in THIS repo only (bare `#123`). Cross-repo refs
            // (`owner/repo#123`) are skipped by keyword-ADJACENCY, not by any
            // lookbehind: the pattern requires `<keyword>\s*:?\s+#<num>`, so a
            // `#` is only captured when the run of whitespace immediately
            // precedes it. In `Closes owner/repo#123` the `owner/repo` sits
            // between the keyword and the `#`, so it never matches; a bare
            // `#123` with no preceding keyword never matches either. Keeping
            // the pattern free of JS-only constructs (named groups, lookbehind)
            // also lets tests/unit/test_auto_close_workflow_shape.py extract
            // and exercise it from Python.
            const re = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\b\s*:?\s+#(\d+)/gi;

            const numbers = new Set();
            for (const m of text.matchAll(re)) {
              numbers.add(Number(m[1]));
            }

            if (numbers.size === 0) {
              core.info('No same-repo closing keywords found in PR title/body.');
              return;
            }
            core.info(`Found closing refs: ${[...numbers].join(', ')}`);

            const { owner, repo } = context.repo;
            for (const issue_number of numbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner, repo, issue_number,
                });

                // A pull request is also an "issue" via this API — never touch
                // PRs, only real issues.
                if (issue.pull_request) {
                  core.info(`#${issue_number} is a PR, skipping.`);
                  continue;
                }
                if (issue.state === 'closed') {
                  core.info(`#${issue_number} already closed, skipping.`);
                  continue;
                }

                await github.rest.issues.createComment({
                  owner, repo, issue_number,
                  body: `Closed by #${pr.number} (merged into \`staging\`). `
                    + `Auto-closed by the staging merge workflow — it will reach `
                    + `\`main\` with the next staging → prod promotion.`,
                });
                await github.rest.issues.update({
                  owner, repo, issue_number,
                  state: 'closed',
                  state_reason: 'completed',
                });
                core.info(`Closed #${issue_number}.`);
              } catch (err) {
                // Don't fail the whole run if one number is bogus (e.g. a
                // deleted issue or a transferred one) — log and continue.
                core.warning(`Could not close #${issue_number}: ${err.message}`);
              }
            }
