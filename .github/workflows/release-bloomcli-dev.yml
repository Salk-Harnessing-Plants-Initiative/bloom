name: release-bloomcli-dev

# Publishes a dev build of the bloomcli package to TestPyPI on every merge to
# staging that touches the package (and on manual dispatch). Separate from the
# server deploy workflow. The version is stamped as <release>.dev<run_number>
# at build time (never committed) so each merge gets a unique, installable build
# that normal `uvx bloomcli` ignores (dev releases are pre-releases per PEP 440).
on:
  push:
    branches: [staging]
    paths:
      - 'bloomcli/**'
      - '.github/workflows/release-bloomcli-dev.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # OIDC token for TestPyPI trusted publishing

concurrency:
  group: release-bloomcli-dev
  cancel-in-progress: false

jobs:
  testpypi:
    name: Publish dev build to TestPyPI
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
      - name: Stamp dev version (<release>.dev<run>, not committed)
        working-directory: bloomcli
        run: |
          base=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          dev="${base}.dev${{ github.run_number }}"
          sed -i -E "s/^version = .*/version = \"${dev}\"/" pyproject.toml
          echo "Building bloomcli ${dev}"
      - name: Build sdist + wheel
        working-directory: bloomcli
        run: uv build
      - name: Publish to TestPyPI (OIDC trusted publishing)
        working-directory: bloomcli
        run: uv publish --publish-url https://test.pypi.org/legacy/ --trusted-publishing always
