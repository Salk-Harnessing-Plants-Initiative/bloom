name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  build-and-audit:
    name: Build & npm CVE Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit (npm)
        run: npm audit --audit-level=critical

      - name: Build shared packages
        run: |
          cd packages/bloom-js && npx tsc -p tsconfig.json
          cd ../../packages/bloom-fs && npx tsc -p tsconfig.json

      - name: TypeScript type check
        run: cd web && npx tsc --noEmit

      - name: Build Next.js app
        run: cd web && npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:8000
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_SUPABASE_COOKIE_NAME: sb-localhost-auth-token

  python-audit:
    name: Python Security Audit for CVEs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv and pip-audit
        run: pip install uv && uv pip install --system pip-audit

      - name: Audit langchain dependencies
        run: pip-audit -r langchain/requirements.txt

      - name: Audit bloommcp dependencies
        run: pip-audit -r bloommcp/requirements.txt

  docker-build:
    name: Build Docker Images & Scan for CVEs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build bloom-web image
        run: |
          docker build -f web/Dockerfile.bloom-web.prod \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=http://localhost:8000 \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder \
            --build-arg NEXT_PUBLIC_SUPABASE_COOKIE_NAME=sb-localhost-auth-token \
            -t bloom-web:ci .

      - name: Build langchain-agent image
        run: docker build -f langchain/Dockerfile -t langchain-agent:ci ./langchain

      - name: Build bloommcp image
        run: docker build -f bloommcp/Dockerfile -t bloommcp:ci ./bloommcp

      # Scan built images for CVEs
      - name: Scan bloom-web image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'bloom-web:ci'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Scan langchain-agent image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'langchain-agent:ci'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Scan bloommcp image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'bloommcp:ci'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  scan-pinned-images:
    name: Scan Public Docker Images for CVEs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract and scan public images from docker-compose.prod.yml
        run: |
          # Extract image names from docker-compose.prod.yml (only pre-built, not build: context)
          grep "image:" docker-compose.prod.yml | awk '{print $2}' | while read image; do
            echo "Scanning $image..."
            docker pull "$image"
            docker run --rm aquasecurity/trivy image --severity CRITICAL --exit-code 0 "$image"
          done

      - name: Scan for critical CVEs (fail on findings)
        run: |
          FAILED=0
          grep "image:" docker-compose.prod.yml | awk '{print $2}' | while read image; do
            if ! docker run --rm aquasecurity/trivy image --severity CRITICAL --exit-code 1 --quiet "$image"; then
              echo "CRITICAL CVEs found in: $image"
              FAILED=1
            fi
          done
          exit $FAILED
