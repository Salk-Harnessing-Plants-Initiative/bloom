name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  build-and-audit:
    name: Build & npm CVE Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Checks npm packages for known CVEs (critical only)
      - name: Security audit (npm)
        run: npm audit --audit-level=critical

      # Ensures auto_https off is not committed — would disable HTTPS in production
      - name: Check Caddy config has no dev overrides
        run: |
          if grep -q "auto_https off" caddy/Caddyfile 2>/dev/null; then
            echo "::error::caddy/Caddyfile contains 'auto_https off' — remove before merging to main"
            exit 1
          fi

      # Compiles bloom-js and bloom-fs TypeScript libraries
      - name: Build shared packages
        run: |
          cd packages/bloom-js && npx tsc -p tsconfig.json
          cd ../../packages/bloom-fs && npx tsc -p tsconfig.json

      # Checks all frontend code for type errors
      - name: TypeScript type check
        run: cd web && npx tsc --noEmit

      # Full production build — catches build errors before merge
      - name: Build Next.js app
        run: cd web && npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:8000
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_SUPABASE_COOKIE_NAME: sb-localhost-auth-token

  # Ensures prod and staging env blocks in deploy.yml stay in sync
  verify-env-parity:
    name: Verify prod/staging env parity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compare prod vs staging env vars
        run: |
          PROD_VARS=$(grep -oE '^[[:space:]]+[A-Z_]+=\$\{\{ secrets\.PROD_' .github/workflows/deploy.yml | awk -F'=' '{print $1}' | tr -d ' ' | sort -u)
          STAGING_VARS=$(grep -oE '^[[:space:]]+[A-Z_]+=\$\{\{ secrets\.STAGING_' .github/workflows/deploy.yml | awk -F'=' '{print $1}' | tr -d ' ' | sort -u)
          if [ -z "$PROD_VARS" ] || [ -z "$STAGING_VARS" ]; then
            echo "::warning::No env vars found in deploy.yml — skipping parity check"
            exit 0
          fi
          if ! diff <(echo "$PROD_VARS") <(echo "$STAGING_VARS"); then
            echo ""
            echo "::error::prod and staging env blocks have drifted — add missing vars to both"
            exit 1
          fi
          echo "prod and staging env blocks are in sync ($(echo "$PROD_VARS" | wc -l) vars)"

  # Scans Python dependencies for known CVEs via lockfile export
  python-audit:
    name: Python Security Audit for CVEs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0

      # Fast feedback on pure-Python utility scripts. Placed in python-audit
      # (not compose-health-check) because this job runs in parallel, has no
      # continue-on-error, and already has uv installed.
      - name: Run Python unit tests
        run: uv run --with pytest pytest tests/unit/ -v --tb=short

      # Enforce lockfile-pyproject sync on the server side. Pre-commit catches
      # this locally but can be bypassed (--no-verify, web-UI merge, Dependabot
      # auto-merge). `uv export --frozen` (used by the audit steps below) exits
      # 0 even on drift — `uv lock --check` is the actual detector, invoked
      # per-service by scripts/check-uv-locks.py.
      - name: Verify uv lockfiles are synced
        run: python scripts/check-uv-locks.py

      # Checks langchain agent Python packages for vulnerabilities
      - name: Audit langchain dependencies
        run: cd langchain && uv export --frozen --no-hashes | uvx pip-audit@2.10.0 -r /dev/stdin

      # Checks bloommcp server Python packages for vulnerabilities
      - name: Audit bloommcp dependencies
        run: cd bloommcp && uv export --frozen --no-hashes | uvx pip-audit@2.10.0 -r /dev/stdin

      # Checks video-worker Python packages for vulnerabilities
      - name: Audit video-worker dependencies
        run: cd services/video-worker && uv export --frozen --no-hashes | uvx pip-audit@2.10.0 -r /dev/stdin

  docker-build:
    name: Build Docker Images & Scan for CVEs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build bloom-web image
        run: |
          docker build --provenance=false -f web/Dockerfile.bloom-web.prod \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=http://localhost:8000 \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder \
            --build-arg NEXT_PUBLIC_SUPABASE_COOKIE_NAME=sb-localhost-auth-token \
            -t bloom-web:ci .

      - name: Build langchain-agent image
        run: docker build --provenance=false -f langchain/Dockerfile -t langchain-agent:ci ./langchain

      - name: Build bloommcp image
        run: docker build --provenance=false -f bloommcp/Dockerfile -t bloommcp:ci ./bloommcp

      # Scan built images for CVEs and generate markdown report
      - name: Scan bloom-web image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'bloom-web:ci'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'
          output: 'trivy-bloom-web.txt'
          trivyignores: '.trivyignore'

      - name: Scan langchain-agent image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'langchain-agent:ci'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'
          output: 'trivy-langchain.txt'
          trivyignores: '.trivyignore'

      - name: Scan bloommcp image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'bloommcp:ci'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'
          output: 'trivy-bloommcp.txt'
          trivyignores: '.trivyignore'

      - name: Generate Trivy report
        if: always()
        run: |
          {
            echo "## Docker Image CVE Report"
            echo ""
            echo "| Image | Critical | High |"
            echo "|-------|----------|------|"
            for img in bloom-web langchain bloommcp; do
              file="trivy-${img}.txt"
              if [ -f "$file" ]; then
                crit=$(grep -P 'CVE-\d+-\d+' "$file" 2>/dev/null | grep -c "CRITICAL" || echo 0)
                high=$(grep -P 'CVE-\d+-\d+' "$file" 2>/dev/null | grep -c "HIGH" || echo 0)
                echo "| ${img} | ${crit} | ${high} |"
              fi
            done
            echo ""
            for img in bloom-web langchain bloommcp; do
              file="trivy-${img}.txt"
              if [ -f "$file" ] && [ -s "$file" ]; then
                cves=$(grep -oP 'CVE-\d+-\d+' "$file" | sort -u | tr '\n' ', ' | sed 's/,$//')
                if [ -n "$cves" ]; then
                  echo "**${img}:** ${cves}"
                  echo ""
                fi
              fi
            done
            echo ""
            echo "> Full scan output available in the [trivy-built-images-report](../actions/artifacts) artifact."
          } > trivy-report.md

      - name: Post Trivy report as PR comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: trivy-docker-build
          path: trivy-report.md

      - name: Upload Trivy report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-built-images-report
          path: trivy-report.md

      - name: Check bloom-web for critical CVEs
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'bloom-web:ci'
          severity: 'CRITICAL'
          exit-code: '1'
          trivyignores: '.trivyignore'

      - name: Check langchain-agent for critical CVEs
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'langchain-agent:ci'
          severity: 'CRITICAL'
          exit-code: '1'
          trivyignores: '.trivyignore'

      - name: Check bloommcp for critical CVEs
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'bloommcp:ci'
          severity: 'CRITICAL'
          exit-code: '1'
          trivyignores: '.trivyignore'

  compose-health-check:
    name: Docker Compose Health Check
    needs: docker-build
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup uv BEFORE compose starts — the compose stack creates
      # root-owned `volumes/db/data/` (postgres bind mount), and setup-uv's
      # cache-dependency glob scans `**/uv.lock` across the whole workspace.
      # Running setup-uv after compose is up causes EACCES when the glob
      # tries to descend into the root-owned volumes directory.
      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0

      - name: Generate .env.ci from secrets
        run: |
          echo "POSTGRES_DB=postgres" > .env.ci
          echo "POSTGRES_USER=supabase_admin" >> .env.ci
          echo "POSTGRES_PORT=5432" >> .env.ci
          echo "POSTGRES_HOST=db-prod" >> .env.ci
          echo "PGRST_DB_SCHEMAS=public,auth,storage" >> .env.ci
          echo "JWT_EXPIRY=3600" >> .env.ci
          echo "ENABLE_ANONYMOUS_USERS=false" >> .env.ci
          echo "ENABLE_EMAIL_SIGNUP=true" >> .env.ci
          echo "ENABLE_EMAIL_AUTOCONFIRM=true" >> .env.ci
          echo "DISABLE_SIGNUP=false" >> .env.ci
          echo "API_EXTERNAL_URL=http://localhost:9999" >> .env.ci
          echo "ADDITIONAL_REDIRECT_URLS=http://localhost" >> .env.ci
          echo "SITE_URL=http://localhost" >> .env.ci
          echo "NEXT_PUBLIC_SUPABASE_URL=http://kong:8000" >> .env.ci
          echo "SUPABASE_URL=http://kong:8000" >> .env.ci
          echo "SUPABASE_COOKIE_NAME=sb-ci-auth-token" >> .env.ci
          echo "NEXT_PUBLIC_APP_URL=http://localhost" >> .env.ci
          echo "SUPABASE_PUBLIC_URL=http://localhost/api" >> .env.ci
          echo "POOLER_TENANT_ID=default" >> .env.ci
          echo "POOLER_DEFAULT_POOL_SIZE=5" >> .env.ci
          echo "POOLER_MAX_CLIENT_CONN=100" >> .env.ci
          echo "POOLER_DB_POOL_SIZE=10" >> .env.ci
          echo "DASHBOARD_USERNAME=ci-admin" >> .env.ci
          echo "DASHBOARD_PASSWORD=ci-changeme" >> .env.ci
          echo "STUDIO_DEFAULT_ORGANIZATION=ci-org" >> .env.ci
          echo "STUDIO_DEFAULT_PROJECT=ci-project" >> .env.ci
          echo "STUDIO_SUPABASE_PUBLIC_URL=http://localhost" >> .env.ci
          echo "MINIO_ROOT_USER=ci-supabase" >> .env.ci
          echo "MINIO_DATA_PATH=/tmp/minio-ci" >> .env.ci
          echo "IMGPROXY_URL=http://imgproxy:5001" >> .env.ci
          echo "IMGPROXY_ENABLE_WEBP_DETECTION=true" >> .env.ci
          echo "DOMAIN_MAIN=localhost" >> .env.ci
          echo "DOMAIN_STUDIO=studio.localhost" >> .env.ci
          echo "DOMAIN_MINIO=minio.localhost" >> .env.ci
          echo "DOMAIN_FLASK=api.localhost" >> .env.ci
          echo "BLOOM_PLOTS_DIR=/app/data/PLOTS_DIR" >> .env.ci
          echo "BLOOM_PLOTS_URL=http://localhost:5002/plots" >> .env.ci
          echo "BLOOMMCP_API_KEY=ci-placeholder" >> .env.ci
          echo "BLOOM_MCP_URL=http://bloommcp:8811/mcp" >> .env.ci
          echo "OPENAI_API_KEY=sk-ci-not-real" >> .env.ci
          echo "LANGCHAIN_TRACING_V2=false" >> .env.ci
          echo "LANGCHAIN_API_KEY=" >> .env.ci
          echo "LANGCHAIN_PROJECT=bloom-ci" >> .env.ci
          echo "CORS_ORIGINS=http://localhost" >> .env.ci
          echo "CADDY_HTTP_LISTEN_PORT=80" >> .env.ci
          echo "CADDY_HTTPS_LISTEN_PORT=443" >> .env.ci
          echo "CADDY_HTTP_PORT=:80" >> .env.ci
          echo "KONG_PORT=8000" >> .env.ci
          echo "BLOOM_WEB_PORT=3000" >> .env.ci
          echo "STUDIO_PORT=3000" >> .env.ci
          echo "MINIO_CONSOLE_PORT=9001" >> .env.ci
          echo "MINIO_BROWSER_REDIRECT_URL=http://minio.localhost" >> .env.ci
          echo "POSTGRES_PASSWORD=${{ secrets.CI_POSTGRES_PASSWORD }}" >> .env.ci
          echo "ANON_KEY=${{ secrets.CI_ANON_KEY }}" >> .env.ci
          echo "SERVICE_ROLE_KEY=${{ secrets.CI_SERVICE_ROLE_KEY }}" >> .env.ci
          echo "JWT_SECRET=${{ secrets.CI_JWT_SECRET }}" >> .env.ci
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.CI_ANON_KEY }}" >> .env.ci
          echo "SUPAVISOR_ENC_KEY=${{ secrets.CI_SUPAVISOR_ENC_KEY }}" >> .env.ci
          echo "VAULT_ENC_KEY=${{ secrets.CI_VAULT_ENC_KEY }}" >> .env.ci
          echo "SECRET_KEY_BASE=${{ secrets.CI_SECRET_KEY_BASE }}" >> .env.ci
          echo "MINIO_ROOT_PASSWORD=${{ secrets.CI_MINIO_PASSWORD }}" >> .env.ci
          echo "DB_ENC_KEY=${{ secrets.CI_DB_ENC_KEY }}" >> .env.ci
          echo "LANGCHAIN_POSTGRES_URL=postgresql://supabase_admin:${{ secrets.CI_POSTGRES_PASSWORD }}@db-prod:5432/postgres" >> .env.ci

      - name: Create MinIO data directory
        run: mkdir -p /tmp/minio-ci && chmod 777 /tmp/minio-ci

      - name: Start MinIO and create buckets
        run: |
          docker compose -f docker-compose.prod.yml --env-file .env.ci up -d supabase-minio
          echo "Waiting for MinIO to be healthy..."
          timeout 60 bash -c 'until docker compose -f docker-compose.prod.yml --env-file .env.ci ps supabase-minio --format json | jq -e "select(.Health == \"healthy\")" > /dev/null 2>&1; do sleep 2; echo "  waiting..."; done'
          echo "MinIO is healthy!"
          docker compose -f docker-compose.prod.yml --env-file .env.ci run --rm minio-init
          echo "Buckets created!"

      - name: Start database
        run: |
          docker compose -f docker-compose.prod.yml --env-file .env.ci up -d db-prod
          echo "Waiting for database to be healthy..."
          timeout 180 bash -c 'until docker compose -f docker-compose.prod.yml --env-file .env.ci ps db-prod --format json | jq -e "select(.Health == \"healthy\")" > /dev/null 2>&1; do sleep 2; echo "  waiting..."; done'
          echo "Database is healthy!"

      - name: Start remaining services
        run: docker compose -f docker-compose.prod.yml --env-file .env.ci up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to become healthy..."
          TIMEOUT=180
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            UNHEALTHY=$(docker compose -f docker-compose.prod.yml --env-file .env.ci ps --format json | jq -r '.[] | select(.Health == "unhealthy" or .Health == "starting") | .Name' 2>/dev/null | wc -l)
            EXITED=$(docker compose -f docker-compose.prod.yml --env-file .env.ci ps --format json | jq -r '.[] | select(.State == "exited" and .ExitCode != 0) | .Name' 2>/dev/null | wc -l)
            if [ "$UNHEALTHY" -eq 0 ] && [ "$EXITED" -eq 0 ]; then
              echo "All services healthy!"
              docker compose -f docker-compose.prod.yml --env-file .env.ci ps
              exit 0
            fi
            echo "Waiting... (${ELAPSED}s / ${TIMEOUT}s) — ${UNHEALTHY} unhealthy, ${EXITED} failed"
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          echo "::error::Services did not become healthy within ${TIMEOUT}s"
          docker compose -f docker-compose.prod.yml --env-file .env.ci ps
          docker compose -f docker-compose.prod.yml --env-file .env.ci logs --tail=50
          exit 1

      - name: Wait for storage schema
        env:
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        run: |
          echo "Polling for storage schema (storage-api creates storage.buckets table on startup)..."
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.prod.yml --env-file .env.ci exec -T \
              -e PGPASSWORD="${POSTGRES_PASSWORD}" db-prod \
              psql -U supabase_admin -d postgres -tAc "SELECT 1 FROM information_schema.tables WHERE table_schema='storage' AND table_name='buckets'" 2>/dev/null | grep -q "^1$"; then
              echo "storage.buckets table ready!"
              exit 0
            fi
            echo "  waiting for storage schema... (attempt $i/60)"
            sleep 2
          done
          echo "::error::Timeout waiting for storage schema"
          exit 1

      # Apply migrations — populates storage.buckets and adds RLS policies
      - name: Apply database migrations
        run: |
          echo "Applying migrations in order:"
          ls -1 supabase/migrations/*.sql | sort
          for migration in supabase/migrations/*.sql; do
            echo "  Running: $(basename $migration)"
            docker compose -f docker-compose.prod.yml --env-file .env.ci exec -T -e PGPASSWORD="${POSTGRES_PASSWORD}" db-prod psql -v ON_ERROR_STOP=1 -U supabase_admin -d postgres < "$migration" 2>&1 || {
              echo "::error::Migration failed: $(basename $migration)"
              exit 1
            }
          done
          echo "Migrations complete!"
        env:
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}

      - name: Verify buckets
        run: |
          echo "=== Checking storage.buckets table ==="
          docker compose -f docker-compose.prod.yml --env-file .env.ci exec -T -e PGPASSWORD="${POSTGRES_PASSWORD}" db-prod \
            psql -v ON_ERROR_STOP=1 -U supabase_admin -d postgres -c "SELECT id, name FROM storage.buckets;" 2>&1
          echo ""
          echo "=== Testing file write to MinIO ==="
          # Run mc in a one-off minio/mc container. The supabase-minio container
          # (minio/minio image) has no mc CLI, which is why the previous invocation
          # was silently failing as a warning on every run. Override the init
          # entrypoint (create-buckets.sh) so we can drive a write-delete probe.
          docker compose -f docker-compose.prod.yml --env-file .env.ci run --rm \
            --entrypoint sh minio-init -c '
              set -e
              mc alias set local http://supabase-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              echo "ci-test" > /tmp/ci-test.txt
              mc cp /tmp/ci-test.txt local/images/ci-test.txt
              mc rm local/images/ci-test.txt
              echo "Write test passed"
            '
        env:
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}

      # Runs 22 integration tests (smoke, auth, RLS, storage, API routing) against the live compose stack
      # Skips if tests/integration/ doesn't exist on this branch
      # (uv is already installed by the `Setup uv` step early in this job —
      # moved there to run before the compose stack creates root-owned
      # `volumes/db/data/`, which otherwise breaks setup-uv's workspace glob.)
      - name: Run integration tests
        run: |
          if [ -d "tests/integration" ]; then
            uv run --with pytest pytest tests/integration/ -v --tb=short
          else
            echo "No integration tests found — skipping"
          fi
        env:
          TEST_BASE_URL: http://localhost
          ANON_KEY: ${{ secrets.CI_ANON_KEY }}
          SERVICE_ROLE_KEY: ${{ secrets.CI_SERVICE_ROLE_KEY }}

      - name: Debug logs on failure
        if: failure()
        run: |
          echo "=== Container Status ==="
          docker compose -f docker-compose.prod.yml --env-file .env.ci ps
          echo "=== db-prod logs ==="
          docker compose -f docker-compose.prod.yml --env-file .env.ci logs db-prod --tail=100
          echo "=== kong logs ==="
          docker compose -f docker-compose.prod.yml --env-file .env.ci logs kong --tail=50
          echo "=== caddy logs ==="
          docker compose -f docker-compose.prod.yml --env-file .env.ci logs caddy --tail=50

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.prod.yml --env-file .env.ci down -v

  extract-pinned-images:
    name: Extract Pinned Images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.extract.outputs.images }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract images from docker-compose.prod.yml
        id: extract
        run: |
          IMAGES=$(grep "image:" docker-compose.prod.yml | awk '{print $2}' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "images=$IMAGES" >> "$GITHUB_OUTPUT"

  scan-pinned-images:
    name: Scan ${{ matrix.image }}
    needs: extract-pinned-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.extract-pinned-images.outputs.images) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull image
        run: docker pull "${{ matrix.image }}"

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: '${{ matrix.image }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'
          output: 'trivy-result.txt'
          trivyignores: '.trivyignore'

      - name: Generate summary
        if: always()
        run: |
          crit=$(grep -P 'CVE-\d+-\d+' trivy-result.txt 2>/dev/null | grep -c "CRITICAL" || echo 0)
          high=$(grep -P 'CVE-\d+-\d+' trivy-result.txt 2>/dev/null | grep -c "HIGH" || echo 0)
          cves=$(grep -oP 'CVE-\d+-\d+' trivy-result.txt 2>/dev/null | sort -u | tr '\n' ',' | sed 's/,$//' || echo "")
          echo "${{ matrix.image }}|${crit}|${high}|${cves}" > summary.txt

      - name: Sanitize artifact name
        if: always()
        id: sanitize
        run: echo "name=$(echo '${{ matrix.image }}' | tr '/:.' '-')" >> "$GITHUB_OUTPUT"

      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-pinned-${{ steps.sanitize.outputs.name }}
          path: summary.txt

      - name: Warn on critical CVEs
        run: |
          if grep -q "CRITICAL" trivy-result.txt 2>/dev/null; then
            echo "::warning::CRITICAL CVEs found in ${{ matrix.image }}"
          fi

  pinned-images-summary:
    name: Pinned Images CVE Summary
    needs: scan-pinned-images
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all scan summaries
        uses: actions/download-artifact@v4
        with:
          pattern: trivy-pinned-*
          path: results

      - name: Generate combined report
        run: |
          {
            echo "## Pinned Image CVE Report"
            echo ""
            echo "| Image | Critical | High | CVEs |"
            echo "|-------|----------|------|------|"
            for file in results/trivy-pinned-*/summary.txt; do
              if [ -f "$file" ]; then
                IFS='|' read -r img crit high cves < "$file"
                if [ -n "$cves" ]; then
                  echo "| ${img} | ${crit} | ${high} | ${cves} |"
                else
                  echo "| ${img} | ${crit} | ${high} | — |"
                fi
              fi
            done
          } > pinned-report.md

      - name: Post as PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: trivy-pinned-images
          path: pinned-report.md
