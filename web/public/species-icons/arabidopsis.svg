<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Arabidopsis">
  <!-- Ground disc -->
  <circle cx="48" cy="48" r="46" fill="#f5f5f4"/>
  <!-- Rosette base leaves (outer, darker) -->
  <g fill="#4d7c0f" opacity="0.85">
    <ellipse cx="20" cy="58" rx="14" ry="6" transform="rotate(-25 20 58)"/>
    <ellipse cx="76" cy="58" rx="14" ry="6" transform="rotate(25 76 58)"/>
    <ellipse cx="48" cy="72" rx="16" ry="7"/>
  </g>
  <!-- Inner leaves -->
  <g fill="#65a30d">
    <ellipse cx="30" cy="50" rx="13" ry="5.5" transform="rotate(-15 30 50)"/>
    <ellipse cx="66" cy="50" rx="13" ry="5.5" transform="rotate(15 66 50)"/>
    <ellipse cx="48" cy="62" rx="14" ry="6"/>
    <ellipse cx="48" cy="44" rx="13" ry="5.5"/>
  </g>
  <!-- Central young leaves -->
  <g fill="#84cc16">
    <ellipse cx="42" cy="46" rx="7" ry="3.5" transform="rotate(-35 42 46)"/>
    <ellipse cx="54" cy="46" rx="7" ry="3.5" transform="rotate(35 54 46)"/>
    <ellipse cx="48" cy="52" rx="7" ry="3.5"/>
  </g>
  <!-- Flowering stem -->
  <rect x="47" y="14" width="2" height="30" rx="1" fill="#65a30d"/>
  <!-- Four-petal flower at top (Brassicaceae hallmark) -->
  <g fill="#ffffff" stroke="#a3a3a3" stroke-width="0.5">
    <circle cx="48" cy="14" r="3.5"/>
    <circle cx="43" cy="17" r="3"/>
    <circle cx="53" cy="17" r="3"/>
    <circle cx="48" cy="20" r="3"/>
  </g>
  <circle cx="48" cy="17" r="1.5" fill="#ca8a04"/>
</svg>
