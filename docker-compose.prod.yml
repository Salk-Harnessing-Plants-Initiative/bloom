# =============================================================================
# Bloom v2 Production Stack
#
# Minimum Resource Requirements:
#   CPU:     8 vCPU
#   RAM:     16 GB
#   Disk:    100 GB SSD
#
# Services: ~15 containers (caddy, bloom-web, langchain-agent, bloommcp,
#   kong, auth, rest, realtime, minio, minio-init, storage, imgproxy,
#   meta, db-prod, supavisor, studio)
#
# Host-exposed ports:
#   80/443  - caddy (reverse proxy, auto HTTPS)
#   55323   - studio (admin, restrict via firewall)
# =============================================================================

name: bloom_v2_prod

services:

  # -------------------
  # Caddy (Reverse Proxy)
  # -------------------
  caddy:
    image: caddy:2.11.2-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${CADDY_HTTP_LISTEN_PORT}:80"
      - "${CADDY_HTTPS_LISTEN_PORT}:443"
    environment:
      DOMAIN_MAIN: ${DOMAIN_MAIN}
      DOMAIN_STUDIO: ${DOMAIN_STUDIO}
      DOMAIN_MINIO: ${DOMAIN_MINIO}
      KONG_PORT: ${KONG_PORT}
      BLOOM_WEB_PORT: ${BLOOM_WEB_PORT}
      STUDIO_PORT: ${STUDIO_PORT}
      MINIO_CONSOLE_PORT: ${MINIO_CONSOLE_PORT}
      CADDY_HTTP_PORT: ${CADDY_HTTP_PORT}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - kong
    networks:
      - supanet

  #-------------------
  # BLOOM WEB 
  #-------------------
  bloom-web:
    build:
      context: .
      dockerfile: ./web/Dockerfile.bloom-web.prod
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
        NEXT_PUBLIC_SUPABASE_COOKIE_NAME: ${SUPABASE_COOKIE_NAME}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      # Internal Docker network - connect directly to Kong
      SUPABASE_URL: ${SUPABASE_URL}
      # Public URL - for browser (baked into build)
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_COOKIE_NAME: ${SUPABASE_COOKIE_NAME}
      NEXT_PUBLIC_SUPABASE_COOKIE_NAME: ${SUPABASE_COOKIE_NAME}
    depends_on:
      - kong
    networks:
      - supanet

  # -------------------
  # LangChain Agent
  # -------------------
  langchain-agent:
    build:
      context: ./langchain
      dockerfile: Dockerfile
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    expose:
      - "5002"
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o
      BLOOM_MCP_URL: http://bloommcp:8811/mcp
      BLOOMMCP_API_KEY: ${BLOOMMCP_API_KEY}
      BLOOM_PLOTS_DIR: ${BLOOM_PLOTS_DIR}
      BLOOM_PLOTS_URL: ${BLOOM_PLOTS_URL}
      LANGCHAIN_POSTGRES_URL: ${LANGCHAIN_POSTGRES_URL}
      JWT_SECRET: ${JWT_SECRET}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    volumes:
      - ./bloommcp/data/PLOTS_DIR:/app/data/PLOTS_DIR
    networks:
      - supanet
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - kong
      - bloommcp
      - db-prod
    restart: unless-stopped
    command: ["uvicorn", "server:app", "--host", "0.0.0.0", "--port", "5002", "--workers", "4"]

  # -------------------
  # Bloom MCP Server
  # -------------------
  bloommcp:
    build:
      context: ./bloommcp
      dockerfile: Dockerfile
    read_only: true
    # /tmp tmpfs: mode 1777 matches standard Linux perms (sticky, world-writable)
    # so numba/cpython can create their cache subdirs unconditionally. size=100m
    # is defensive — numba cache is ~KB, but an explicit cap prevents any noisy
    # neighbor on /tmp from starving the cache. Used by NUMBA_CACHE_DIR +
    # PYTHONPYCACHEPREFIX below.
    tmpfs:
      - /tmp:mode=1777,size=100m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    expose:
      - "8811"
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      BLOOM_TRAITS_DIR: /app/data/SLEAP_OUT_CSV
      BLOOM_OUTPUT_DIR: /app/data/ANALYSIS_OUTPUT
      BLOOM_PLOTS_DIR: /app/data/PLOTS_DIR
      BLOOM_PLOTS_URL: ${BLOOM_PLOTS_URL}
      BLOOMMCP_API_KEY: ${BLOOMMCP_API_KEY}
      # numba AOT cache. bloommcp imports umap-learn, which uses
      # @numba.jit(cache=True); without this env var, numba tries to write
      # to site-packages/__pycache__/ and fails under read_only: true.
      # /tmp is tmpfs-mounted above, so /tmp/numba is writable. Only
      # bloommcp needs this — bloom-web (Node.js) and langchain-agent
      # (no numba imports; confirmed via grep of langchain/uv.lock) do not.
      # Cache is ephemeral (tmpfs wipes on container restart), so the first
      # UMAP call after every restart re-JITs — acceptable for this deploy;
      # revisit with a named volume if restart-frequent.
      NUMBA_CACHE_DIR: /tmp/numba
      # CPython bytecode cache. Same root-cause as NUMBA_CACHE_DIR — without
      # this, CPython tries to write .pyc files to site-packages/__pycache__/
      # on first import. CPython degrades gracefully on write failure (falls
      # back to re-parsing source every import) but emits noisy warnings and
      # pays re-parse cost on every cold start. Redirecting to /tmp/pycache
      # restores the normal caching path.
      PYTHONPYCACHEPREFIX: /tmp/pycache
    volumes:
      - ./bloommcp/data/SLEAP_OUT_CSV:/app/data/SLEAP_OUT_CSV
      - ./bloommcp/data/PLOTS_DIR:/app/data/PLOTS_DIR
      - ./bloommcp/data/ANALYSIS_OUTPUT:/app/data/ANALYSIS_OUTPUT
    networks:
      - supanet
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,urllib.request; r=urllib.request.Request('http://localhost:8811/mcp', headers={'Authorization': 'Bearer '+os.environ.get('BLOOMMCP_API_KEY','')}); urllib.request.urlopen(r)\""]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - kong
    restart: unless-stopped

  # -------------------
  #  Kong Gateway
  # -------------------
  kong:
    image: kong:2.8.1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - supanet
    expose:
      - "8000"
      - "8443"
    volumes:
      - ./volumes/api/kong.yml:/home/kong/temp.yml:ro,z
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    entrypoint: bash -c 'eval "echo \"$$(cat ~/temp.yml)\"" > ~/kong.yml && /docker-entrypoint.sh kong docker-start'
  
  # -------------------
  # Auth (GoTrue)
  # -------------------
  auth:
    image: supabase/gotrue:v2.188.1@sha256:87db8c737af49a64236c461882ed3925f8b1e5c2c47176c64694dedc65153573
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - supanet
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: ${JWT_EXPIRY}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_EMAIL_ENABLED: ${ENABLE_EMAIL_SIGNUP}
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: ${ENABLE_ANONYMOUS_USERS}
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM}

      # Custom access token hook — assigns bloom_user/bloom_admin role via JWT
      GOTRUE_HOOK_CUSTOM_ACCESS_TOKEN_ENABLED: "true"
      GOTRUE_HOOK_CUSTOM_ACCESS_TOKEN_URI: "pg-functions://postgres/public/custom_access_token_hook"

  # -------------------
  # PostgREST
  # -------------------
  rest:
    image: postgrest/postgrest:v12.2.12@sha256:5f4ce744539bbba786b4e24dbbd95bdb2a956dcf568c5374995a0ff4a68f5bd2
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - supanet
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS}
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: ${JWT_EXPIRY}
    command:
      [
        "postgrest"
      ]
  
  # -------------------
  # Realtime Analytics
  # -------------------
  realtime:
    image: supabase/realtime:v2.34.47
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    networks:
      - supanet
    environment:
      PORT: 4000
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
      DB_ENC_KEY: ${DB_ENC_KEY}
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ERL_AFLAGS: -proto_dist inet_tcp
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: true
      RUN_JANITOR: true

  # -------------------
  # MinIO
  # -------------------
  supabase-minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - supanet
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
    command: server --console-address ":9001" /data
    volumes:
      - ${MINIO_DATA_PATH}:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      supabase-minio:
        condition: service_healthy
    networks:
      - supanet
    entrypoint: ["/bin/sh", "/usr/local/bin/init/create-buckets.sh"]
    volumes:
      - ./minio/init:/usr/local/bin/init
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

  
  # -------------------
  # Supabase Storage
  # -------------------
  storage:
    image: supabase/storage-api:v1.48.14
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - supanet
    expose:
      - "5000"
    volumes:
      - ./volumes/storage:/var/lib/storage:z
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: s3
      STORAGE_S3_BUCKET: bloom-storage
      STORAGE_S3_ENDPOINT: http://supabase-minio:9000
      STORAGE_S3_FORCE_PATH_STYLE: "true"
      STORAGE_S3_REGION: us-east-1
      STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: ${IMGPROXY_URL}
  
  # -------------------
  # Database (Postgres)
  # -------------------
  db-prod:
    image: supabase/postgres:15.14.1.104
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_OVERRIDE
    networks:
      - supanet
    expose:
      - "5432"
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data:Z
      - ./volumes/db/_supabase.sh:/docker-entrypoint-initdb.d/96-_supabase.sh:Z
      - ./volumes/db/realtime.sql:/docker-entrypoint-initdb.d/migrations/99-realtime.sql:Z
      - ./volumes/db/webhooks.sql:/docker-entrypoint-initdb.d/init-scripts/98-webhooks.sql:Z
      - ./volumes/db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:Z
      - ./volumes/db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:Z
      - ./volumes/db/logs.sql:/docker-entrypoint-initdb.d/migrations/99-logs.sql:Z
      - ./volumes/db/pooler.sql:/docker-entrypoint-initdb.d/migrations/99-pooler.sql:Z
      - db-config:/etc/postgresql-custom
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: ${JWT_EXPIRY}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supabase_admin} -d ${POSTGRES_DB:-postgres} -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    command:
      [
        "postgres",
        "-c",
        "config_file=/etc/postgresql/postgresql.conf",
        "-c",
        "log_min_messages=fatal"
      ]
  
  # -------------------
  # Supavisor (Connection Pooler)
  # -------------------
  supavisor:
    image: supabase/supavisor:2.7.4
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - supanet
    expose:
      - "6543"
    volumes:
      - ./volumes/pooler/pooler.exs:/etc/pooler/pooler.exs:ro,z
    environment:
      PORT: 4000
      SUPAVISOR_ENC_KEY: ${SUPAVISOR_ENC_KEY}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: ecto://supabase_admin:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/_supabase
      CLUSTER_POSTGRES: true
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      VAULT_ENC_KEY: ${VAULT_ENC_KEY}
      API_JWT_SECRET: ${JWT_SECRET}
      METRICS_JWT_SECRET: ${JWT_SECRET}
      REGION: local
      ERL_AFLAGS: -proto_dist inet_tcp
      POOLER_TENANT_ID: ${POOLER_TENANT_ID}
      POOLER_DEFAULT_POOL_SIZE: ${POOLER_DEFAULT_POOL_SIZE}
      POOLER_MAX_CLIENT_CONN: ${POOLER_MAX_CLIENT_CONN}
      POOLER_POOL_MODE: transaction
      DB_POOL_SIZE: ${POOLER_DB_POOL_SIZE}
    command:
      [
        "/bin/sh",
        "-c",
        "/app/bin/migrate && /app/bin/supavisor eval \"$$(cat /etc/pooler/pooler.exs)\" && /app/bin/server"
      ]
  # -------------------
  # Supabase Studio
  # -------------------
  studio:
    image: supabase/studio:2026.03.30-sha-12a43e5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - supanet
    expose:
      - "3000"
    # Studio accessible via Caddy DOMAIN_STUDIO route — no direct port exposure in prod
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_PUBLIC_URL: ${STUDIO_SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}

  # -------------------
  # ImgProxy
  # -------------------
  imgproxy:
    image: darthsim/imgproxy:v3.31.1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - supanet
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: ${IMGPROXY_ENABLE_WEBP_DETECTION}
  
  meta:
    image: supabase/postgres-meta:v0.96.2
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - supanet
    depends_on:
      db-prod:
        condition: service_healthy
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: ${POSTGRES_HOST}
      PG_META_DB_PORT: ${POSTGRES_PORT}
      PG_META_DB_NAME: ${POSTGRES_DB}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
  
  # NOTE: analytics (Logflare) removed — makes unauthorized outbound
  # connections to DataDog. See: https://github.com/supabase/cli/issues/3254

volumes:
  db-config:
  caddy-data:
  caddy-config:

networks:
  supanet:
    driver: bridge




